# API 自动化项目 CI — 测试工程师简历向配置
# 学习重点: smoke 门禁 → 全量回归 → 上传 JUnit 报告

name: API Automation CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AUTO_START_MOCK: "true"
  API_BASE_URL: http://127.0.0.1:3100
  API_TIMEOUT: "5"
  TEST_ENV: ci

jobs:
  # ── Job 1: Smoke（快速门禁，2 条用例）────────────────────────
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke tests
        run: |
          mkdir -p reports
          pytest -m smoke -v --junitxml=reports/junit-smoke.xml

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-smoke
          path: reports/junit-smoke.xml
          retention-days: 14

  # ── Job 2: 全量回归（smoke 通过后再跑，5 条用例）──────────────
  regression:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full API regression
        run: python run_tests.py

      - name: Upload full JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-full
          path: reports/junit.xml
          retention-days: 14
